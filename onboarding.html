<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding | Migo Prototype</title>
<link rel="preload" href="assets/fonts/MigrosbankKievit-Book.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/MigrosbankKievit-Bold.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Book.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Bold.woff2') format('woff2');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --primary-default:    #144b3c;
    --primary-ondefault:  #ffffff;
    --primary-subtle1:    #eff2f1;
    --primary-subtle3:    #c4d2ce;
    --primary-subtle4:    #92a59e;
    --primary-subtle5:    #5a8a7e;
    --neutral-bold3:      #333333;
    --spacing-xs:  8px;
    --spacing-s:   16px;
    --spacing-m:   24px;
    --radius-s:  8px;
    --radius-m:  12px;
    --radius-l:  16px;
    --font-family: 'Migrosbank Kievit', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  html, body { height: 100%; }

  body {
    font-family: var(--font-family);
    background: #ffffff;
    color: var(--primary-default);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  .shell {
    width: min(100%, 600px);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--primary-ondefault);
  }

  .page-header {
    height: 50px;
    background: var(--primary-ondefault);
    border-bottom: 1px solid var(--primary-subtle3);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--spacing-s);
    flex-shrink: 0;
  }
  .mb-logo { display: flex; align-items: center; }
  .mb-logo-mark {
    width: auto;
    height: 22px;
    display: block;
    object-fit: contain;
  }
  .page-header-menu {
    width: 24px;
    height: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }
  .page-header-menu span {
    display: block;
    width: 18px;
    height: 2px;
    background: var(--neutral-bold3);
    border-radius: 1px;
  }

  .onboarding {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .hero {
    position: relative;
    width: 100%;
    aspect-ratio: 390 / 759;
    overflow: hidden;
    border-bottom-left-radius: var(--radius-l);
    border-bottom-right-radius: var(--radius-l);
    flex-shrink: 0;
  }
  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }
  .hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 20%, rgba(0,0,0,0.3) 56%);
    pointer-events: none;
  }

  .hero-copy {
    position: absolute;
    top: 38px;
    left: 30px;
    right: 30px;
    color: var(--primary-ondefault);
  }
  .hero-copy h1 {
    font-family: var(--font-family);
    font-size: 44px;
    font-weight: 500;
    line-height: 1.1;
    letter-spacing: -0.5px;
    color: var(--primary-ondefault);
    word-break: break-word;
  }
  .hero-copy p {
    font-family: var(--font-family);
    font-size: 18px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--primary-ondefault);
    margin-top: var(--spacing-xs);
  }

  .stoerer-stack {
    position: absolute;
    left: 30px;
    right: 30px;
    bottom: 88px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    pointer-events: none;
  }
  .stoerer {
    display: flex;
    align-items: center;
    gap: var(--spacing-s);
    padding: 12px var(--spacing-s);
    background: var(--primary-subtle1);
    border-radius: var(--radius-s);
    width: 276px;
    max-width: 100%;
  }
  .stoerer--right { align-self: flex-end; opacity: 0.8; }
  .stoerer--left  { align-self: flex-start; opacity: 0.7; }
  .stoerer svg {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    color: var(--primary-default);
  }
  .stoerer span {
    font-family: var(--font-family);
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--primary-default);
  }

  .cta-wrap {
    margin-top: auto;
    padding: var(--spacing-m) var(--spacing-s) calc(var(--spacing-m) + env(safe-area-inset-bottom, 0px));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .pn-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 48px;
    padding: 12px 24px;
    background: var(--primary-default);
    color: var(--primary-ondefault);
    font-family: var(--font-family);
    font-size: 16px;
    font-weight: 500;
    text-decoration: none;
    border-radius: var(--radius-s);
    border: none;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }
  .pn-cta:hover { opacity: 0.92; }
  .pn-cta:active { transform: scale(0.99); }

  .pagination {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pagination .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--primary-subtle3);
    display: block;
  }
  .pagination .dot.active {
    background: var(--primary-default);
    width: 24px;
    border-radius: 3px;
  }
</style>
</head>
<body>

  <div class="shell">

    <header class="page-header">
      <div class="mb-logo">
        <img class="mb-logo-mark" src="assets/migo-logo.png" alt="Migros Bank">
      </div>
      <button type="button" class="page-header-menu" aria-label="Menü">
        <span></span><span></span><span></span>
      </button>
    </header>

    <main class="onboarding">

      <section class="hero">
        <img class="hero-img" src="assets/onboarding-hero.png" alt="">
        <div class="hero-gradient"></div>

        <div class="hero-copy">
          <h1>Was beschäftigt Sie gerade?</h1>
          <p>Wählen Sie Ihre Situation und wir finden die passende Lösung.</p>
        </div>

        <div class="stoerer-stack">
          <div class="stoerer stoerer--right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 13.5h12a3 3 0 0 0 3-3V9a3 3 0 0 0-3-3H8.5"/>
              <path d="M3 13.5V19a1 1 0 0 0 1 1h10"/>
              <path d="M16.5 6c0-1.4 1.1-2.5 2.5-2.5S21.5 4.6 21.5 6 20.4 8.5 19 8.5h-2.5V6Z"/>
              <path d="M12.5 6c0-1.4-1.1-2.5-2.5-2.5S7.5 4.6 7.5 6 8.6 8.5 10 8.5h2.5V6Z"/>
            </svg>
            <span>Was kann ich mir im Alter leisten?</span>
          </div>

          <div class="stoerer stoerer--left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 12V9a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3"/>
              <path d="M3 12.5h18a1 1 0 0 1 1 1V18a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-4.5a1 1 0 0 1 1-1Z"/>
              <path d="M5 19v2"/>
              <path d="M19 19v2"/>
              <path d="M8 12.5v-2a1.5 1.5 0 0 1 1.5-1.5h5A1.5 1.5 0 0 1 16 10.5v2"/>
            </svg>
            <span>Wann kann ich in Pension gehen?</span>
          </div>
        </div>
      </section>

      <div class="cta-wrap">
        <a class="pn-cta" href="personalize.html">Los geht's</a>
        <div class="pagination" aria-hidden="true">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

    </main>

  </div>

</body>
</html>
