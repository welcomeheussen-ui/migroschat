<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personalisierung | Migo Prototype</title>
<link rel="preload" href="assets/fonts/MigrosbankKievit-Book.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/MigrosbankKievit-Bold.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Book.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Bold.woff2') format('woff2');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --primary-default:    #144b3c;
    --primary-ondefault:  #ffffff;
    --primary-subtle1:    #eff2f1;
    --primary-subtle3:    #c4d2ce;
    --primary-subtle4:    #92a59e;
    --primary-subtle5:    #5a8a7e;
    --tertiary-darkgreen: #6b7a6c;
    --neutral-bold3:      #333333;
    --spacing-xs:  8px;
    --spacing-s:   16px;
    --spacing-m:   24px;
    --radius-s:  8px;
    --radius-m:  12px;
    --radius-l:  16px;
    --font-family: 'Migrosbank Kievit', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  html, body { height: 100%; }

  body {
    font-family: var(--font-family);
    background: #ffffff;
    color: var(--primary-default);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  .shell {
    width: min(100%, 600px);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--primary-ondefault);
  }

  .page-header {
    height: 50px;
    background: var(--primary-ondefault);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--spacing-s);
    flex-shrink: 0;
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
    position: relative;
    z-index: 5;
  }
  .mb-logo { display: flex; align-items: center; }
  .mb-logo-mark {
    width: auto;
    height: 22px;
    display: block;
    object-fit: contain;
  }
  .page-header-menu {
    width: 24px;
    height: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }
  .page-header-menu span {
    display: block;
    width: 18px;
    height: 2px;
    background: var(--neutral-bold3);
    border-radius: 1px;
  }

  .personalize {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .heading {
    padding: 32px var(--spacing-s) var(--spacing-m);
  }
  .heading h1 {
    font-family: var(--font-family);
    font-size: 26px;
    font-weight: 500;
    line-height: 1.31;
    letter-spacing: -0.26px;
    color: var(--primary-default);
  }

  .input-wrap {
    padding: 0 var(--spacing-s) var(--spacing-xs);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .name-input {
    width: 100%;
    height: 40px;
    padding: 0 var(--spacing-s);
    border: 1px solid var(--primary-subtle3);
    border-radius: var(--radius-s);
    background: var(--primary-ondefault);
    font-family: var(--font-family);
    font-size: 16px;
    font-weight: 400;
    line-height: 1.375;
    letter-spacing: 0.08px;
    color: var(--primary-default);
    outline: none;
    transition: border-color 0.15s ease;
  }
  .name-input::placeholder {
    color: var(--primary-subtle4);
  }
  .name-input:focus {
    border-color: var(--primary-default);
  }
  .helper {
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
    font-family: var(--font-family);
    font-size: 14px;
    font-weight: 400;
    line-height: 1.43;
    letter-spacing: 0.07px;
    color: var(--tertiary-darkgreen);
  }
  .helper svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  .cta-bar {
    margin-top: auto;
    padding: var(--spacing-xs) var(--spacing-s) calc(var(--spacing-xs) + env(safe-area-inset-bottom, 0px));
  }
  .pn-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 40px;
    padding: 8px var(--spacing-s);
    background: var(--primary-default);
    color: var(--primary-ondefault);
    font-family: var(--font-family);
    font-size: 16px;
    font-weight: 400;
    line-height: 1.375;
    letter-spacing: 0.08px;
    text-decoration: none;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }
  .pn-cta:hover:not(:disabled) { opacity: 0.92; }
  .pn-cta:active:not(:disabled) { transform: scale(0.99); }
  .pn-cta:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
</style>
</head>
<body>

  <div class="shell">

    <header class="page-header">
      <div class="mb-logo">
        <img class="mb-logo-mark" src="assets/migo-logo.png" alt="Migros Bank">
      </div>
      <button type="button" class="page-header-menu" aria-label="Menü">
        <span></span><span></span><span></span>
      </button>
    </header>

    <main class="personalize">

      <section class="heading">
        <h1>Bevor wir starten.<br>Wie dürfen wir Sie ansprechen?</h1>
      </section>

      <section class="input-wrap">
        <label class="visually-hidden" for="nameInput">Ihr Vorname</label>
        <input
          id="nameInput"
          class="name-input"
          type="text"
          autocomplete="given-name"
          inputmode="text"
          maxlength="40"
          placeholder="Ihr Vorname"
          aria-describedby="nameHelp"
          autofocus
        />
        <p id="nameHelp" class="helper">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="8" cy="8" r="6.5"/>
            <path d="M8 7.5v3.5"/>
            <circle cx="8" cy="5.2" r="0.6" fill="currentColor" stroke="none"/>
          </svg>
          <span>Diese Information wird nicht gespeichert</span>
        </p>
      </section>

      <div class="cta-bar">
        <button id="continueBtn" type="button" class="pn-cta" disabled>Weiter</button>
      </div>

    </main>

  </div>

  <script>
    (function () {
      var input = document.getElementById('nameInput');
      var btn   = document.getElementById('continueBtn');

      var existing = '';
      try { existing = (sessionStorage.getItem('mb.userName') || '').trim(); } catch (e) {}
      if (existing) {
        input.value = existing;
        btn.disabled = false;
      }

      input.addEventListener('input', function () {
        btn.disabled = input.value.trim().length === 0;
      });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !btn.disabled) {
          e.preventDefault();
          go();
        }
      });
      btn.addEventListener('click', go);

      function go () {
        var name = input.value.trim().slice(0, 40);
        if (!name) return;
        try { sessionStorage.setItem('mb.userName', name); } catch (e) {}
        window.location.href = 'chat.html';
      }
    })();
  </script>

</body>
</html>
