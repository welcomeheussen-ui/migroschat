<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personalisierung | Migo Prototype</title>
<link rel="preload" href="assets/fonts/MigrosbankKievit-Book.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/MigrosbankKievit-Bold.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Book.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Bold.woff2') format('woff2');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --primary-default:    #144b3c;
    --primary-ondefault:  #ffffff;
    --primary-subtle1:    #eff2f1;
    --primary-subtle3:    #c4d2ce;
    --primary-subtle4:    #92a59e;
    --primary-subtle5:    #5a8a7e;
    --tertiary-darkgreen: #6b7a6c;
    --accent1:            #4f1c68;
    --accent1-pink:       #d9007e;
    --neutral-bold3:      #333333;
    --spacing-xs:  8px;
    --spacing-s:   16px;
    --spacing-m:   24px;
    --spacing-l:   32px;
    --radius-xs: 6px;
    --radius-s:  8px;
    --radius-m:  12px;
    --radius-l:  16px;
    --font-family: 'Migrosbank Kievit', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  html, body { height: 100%; }

  body {
    font-family: var(--font-family);
    background: #ffffff;
    color: var(--primary-default);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: stretch;
    justify-content: center;
    overflow-x: hidden;
  }

  .shell {
    width: min(100%, 600px);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--primary-ondefault);
  }

  /* ── Page header (mb-header — responsive mega-nav, shared with home.html) ── */
  .mb-header {
    background: var(--primary-ondefault);
    box-shadow: 0 4px 50px rgba(79, 31, 104, 0.1);
    width: 100vw;
    margin-left: calc(50% - 50vw);
    flex-shrink: 0;
    z-index: 9;
  }
  .mb-header-inner { max-width: 1920px; margin: 0 auto; padding: 0 40px; }
  .mb-header-top { height: 45px; display: flex; align-items: flex-end; justify-content: space-between; gap: var(--spacing-m); }
  .mb-logo { display: flex; align-items: center; text-decoration: none; color: inherit; }
  .mb-logo img { width: 201px; height: 30px; display: block; object-fit: contain; }
  .mb-meta-nav { display: flex; align-items: flex-end; gap: var(--spacing-m); }
  .mb-meta-link { font-size: 14px; font-weight: 500; line-height: 1.5; color: var(--tertiary-darkgreen); text-decoration: none; padding-bottom: 2px; border-bottom: 2px solid transparent; white-space: nowrap; }
  .mb-meta-link:hover { color: var(--primary-default); }
  .mb-meta-link.is-active { color: var(--primary-default); border-bottom-color: var(--primary-default); }
  .mb-header-bottom { height: 75px; display: flex; align-items: center; justify-content: space-between; gap: var(--spacing-m); }
  .mb-main-nav { display: flex; align-items: stretch; gap: var(--spacing-l); height: 75px; }
  .mb-main-link { display: flex; align-items: flex-start; height: 75px; padding-top: 24px; font-size: 18px; font-weight: 500; line-height: 1.5; color: var(--tertiary-darkgreen); text-decoration: none; border-bottom: 2px solid transparent; white-space: nowrap; }
  .mb-main-link:hover { color: var(--primary-default); }
  .mb-main-link.is-active { color: var(--primary-default); border-bottom-color: var(--primary-default); }
  .mb-header-actions { display: flex; align-items: center; gap: 12px; }
  .mb-icon-btn { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: var(--primary-subtle1); border: 2px solid var(--primary-subtle1); border-radius: var(--radius-s); cursor: pointer; }
  .mb-icon-btn img { width: 22px; height: 22px; display: block; }
  .mb-btn-secondary { display: flex; align-items: center; gap: var(--spacing-xs); height: 48px; padding: 0 var(--spacing-m); background: var(--primary-subtle1); border: none; border-radius: var(--radius-xs); color: var(--primary-default); font-family: inherit; font-size: 16px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .mb-btn-secondary img { width: 24px; height: 24px; flex-shrink: 0; display: block; }
  .mb-btn-login { display: flex; align-items: center; justify-content: center; width: 200px; height: 48px; border-radius: var(--radius-xs); background: linear-gradient(18deg, var(--accent1-pink) 3%, var(--accent1) 90%); color: #fff; font-size: 16px; font-weight: 500; text-decoration: none; white-space: nowrap; transition: opacity 0.15s ease; }
  .mb-btn-login:hover { opacity: 0.92; }
  .page-header-menu { width: 24px; height: 24px; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: none; border: none; padding: 0; cursor: pointer; }
  .page-header-menu span { display: block; width: 18px; height: 2px; background: var(--neutral-bold3); border-radius: 1px; }
  @media (max-width: 1200px) {
    .mb-header { box-shadow: none; border-bottom: 1px solid var(--primary-subtle3); }
    .mb-header-inner { padding: 0 var(--spacing-s); }
    .mb-header-top { height: 56px; align-items: center; }
    .mb-logo img { width: 147px; height: 22px; }
    .mb-meta-nav, .mb-header-bottom { display: none; }
    .page-header-menu { display: flex; }
  }

  .personalize {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .heading {
    padding: 32px var(--spacing-s) var(--spacing-m);
  }
  .heading h1 {
    font-family: var(--font-family);
    font-size: 26px;
    font-weight: 500;
    line-height: 1.31;
    letter-spacing: -0.26px;
    color: var(--primary-default);
  }

  .input-wrap {
    padding: 0 var(--spacing-s) var(--spacing-xs);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .name-input {
    width: 100%;
    height: 40px;
    padding: 0 var(--spacing-s);
    border: 1px solid var(--primary-subtle3);
    border-radius: var(--radius-s);
    background: var(--primary-ondefault);
    font-family: var(--font-family);
    font-size: 16px;
    font-weight: 400;
    line-height: 1.375;
    letter-spacing: 0.08px;
    color: var(--primary-default);
    outline: none;
    transition: border-color 0.15s ease;
  }
  .name-input::placeholder {
    color: var(--primary-subtle4);
  }
  .name-input:focus {
    border-color: var(--primary-default);
  }
  .helper {
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
    font-family: var(--font-family);
    font-size: 14px;
    font-weight: 400;
    line-height: 1.43;
    letter-spacing: 0.07px;
    color: var(--tertiary-darkgreen);
  }
  .helper svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  .cta-bar {
    margin-top: auto;
    padding: var(--spacing-xs) var(--spacing-s) calc(var(--spacing-xs) + env(safe-area-inset-bottom, 0px));
  }
  .pn-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 40px;
    padding: 8px var(--spacing-s);
    background: var(--primary-default);
    color: var(--primary-ondefault);
    font-family: var(--font-family);
    font-size: 16px;
    font-weight: 400;
    line-height: 1.375;
    letter-spacing: 0.08px;
    text-decoration: none;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }
  .pn-cta:hover:not(:disabled) { opacity: 0.92; }
  .pn-cta:active:not(:disabled) { transform: scale(0.99); }
  .pn-cta:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
</style>
</head>
<body>

  <div class="shell">

    <header class="mb-header">
      <div class="mb-header-inner">
        <!-- Top row: logo + meta links -->
        <div class="mb-header-top">
          <a class="mb-logo" href="index.html" aria-label="Migros Bank Startseite">
            <img src="assets/migrosbank-logo.svg" alt="Migros Bank">
          </a>
          <nav class="mb-meta-nav" aria-label="Sekundärnavigation">
            <a class="mb-meta-link" href="#">Privatpersonen</a>
            <a class="mb-meta-link" href="#">Firmen</a>
            <a class="mb-meta-link" href="#">Ratgeber</a>
            <a class="mb-meta-link" href="#">Über uns</a>
            <a class="mb-meta-link" href="#">Hilfe</a>
            <a class="mb-meta-link" href="#">Kontakt</a>
          </nav>
          <button class="page-header-menu" type="button" aria-label="Menü">
            <span></span><span></span><span></span>
          </button>
        </div>

        <!-- Bottom row: main nav + actions -->
        <div class="mb-header-bottom">
          <nav class="mb-main-nav" aria-label="Hauptnavigation">
            <a class="mb-main-link" href="#">Konten &amp; Karten</a>
            <a class="mb-main-link" href="#">Hypotheken</a>
            <a class="mb-main-link" href="#">Kredite</a>
            <a class="mb-main-link" href="#">Anlegen</a>
            <a class="mb-main-link" href="#">Vorsorgen</a>
            <a class="mb-main-link" href="#">E-Banking</a>
          </nav>
          <div class="mb-header-actions">
            <button class="mb-icon-btn" type="button" aria-label="Suche">
              <img src="assets/icon-search.svg" alt="">
            </button>
            <a class="mb-btn-secondary" href="home.html">
              <img src="assets/Maps-Search Streamline Ultimate.svg" alt="">
              Alle Produkte
            </a>
            <a class="mb-btn-login" href="#">E-Banking Login</a>
          </div>
        </div>
      </div>
    </header>

    <main class="personalize">

      <section class="heading">
        <h1>Bevor wir starten.<br>Wie dürfen wir Sie ansprechen?</h1>
      </section>

      <section class="input-wrap">
        <label class="visually-hidden" for="nameInput">Ihr Vorname</label>
        <input
          id="nameInput"
          class="name-input"
          type="text"
          autocomplete="given-name"
          inputmode="text"
          maxlength="40"
          placeholder="Ihr Vorname"
          aria-describedby="nameHelp"
          autofocus
        />
        <p id="nameHelp" class="helper">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="8" cy="8" r="6.5"/>
            <path d="M8 7.5v3.5"/>
            <circle cx="8" cy="5.2" r="0.6" fill="currentColor" stroke="none"/>
          </svg>
          <span>Diese Information wird nicht gespeichert</span>
        </p>
      </section>

      <div class="cta-bar">
        <button id="continueBtn" type="button" class="pn-cta" disabled>Weiter</button>
      </div>

    </main>

  </div>

  <script>
    (function () {
      var input = document.getElementById('nameInput');
      var btn   = document.getElementById('continueBtn');

      var existing = '';
      try { existing = (sessionStorage.getItem('mb.userName') || '').trim(); } catch (e) {}
      if (existing) {
        input.value = existing;
        btn.disabled = false;
      }

      input.addEventListener('input', function () {
        btn.disabled = input.value.trim().length === 0;
      });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !btn.disabled) {
          e.preventDefault();
          go();
        }
      });
      btn.addEventListener('click', go);

      function go () {
        var name = input.value.trim().slice(0, 40);
        if (!name) return;
        try { sessionStorage.setItem('mb.userName', name); } catch (e) {}
        window.location.href = 'chat.html';
      }
    })();
  </script>

</body>
</html>
