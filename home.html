<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migros Bank</title>
<link rel="preload" href="assets/fonts/MigrosbankKievit-Book.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/MigrosbankKievit-Bold.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Book.woff2') format('woff2');
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Bold.woff2') format('woff2');
    font-weight: 500;
    font-display: swap;
  }
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Bold.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
  }

  /* ── Migros Bank Design Tokens (from Figma) ── */
  :root {
    --primary-default:    #144b3c;
    --primary-ondefault:  #ffffff;
    --primary-subtle1:    #eff2f1;
    --primary-subtle3:    #c4d2ce;
    --tertiary-darkgreen: #6b7a6c;
    --accent1:            #4f1c68;
    --accent1-pink:       #d9007e;
    --neutral-bold3:      #333333;

    --spacing-xs:  8px;
    --spacing-s:   16px;
    --spacing-m:   24px;
    --spacing-l:   32px;

    --radius-xs:  6px;
    --radius-s:   8px;

    --font-family: 'Migrosbank Kievit', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  html, body { height: 100%; }

  body {
    font-family: var(--font-family);
    background: var(--primary-ondefault);
    color: var(--primary-default);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ───────────────── Page header (desktop mega-nav) ───────────────── */
  .mb-header {
    background: var(--primary-ondefault);
    box-shadow: 0 4px 50px rgba(79, 31, 104, 0.1);
    flex-shrink: 0;
    z-index: 9;
  }
  .mb-header-inner {
    max-width: 1920px;
    margin: 0 auto;
    padding: 0 40px;
  }

  /* Top row — logo + meta links */
  .mb-header-top {
    height: 45px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: var(--spacing-m);
  }
  .mb-logo { display: flex; align-items: center; text-decoration: none; }
  .mb-logo img { height: 30px; width: auto; display: block; }

  .mb-meta-nav {
    display: flex;
    align-items: flex-end;
    gap: var(--spacing-m);
  }
  .mb-meta-link {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--tertiary-darkgreen);
    text-decoration: none;
    padding-bottom: 2px;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .mb-meta-link:hover { color: var(--primary-default); }
  .mb-meta-link.is-active {
    color: var(--primary-default);
    border-bottom-color: var(--primary-default);
  }

  /* Bottom row — main nav + actions */
  .mb-header-bottom {
    height: 75px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--spacing-m);
  }
  .mb-main-nav {
    display: flex;
    align-items: stretch;
    gap: var(--spacing-l);
    height: 75px;
  }
  .mb-main-link {
    display: flex;
    align-items: flex-start;
    height: 75px;
    padding-top: 24px;
    font-size: 18px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--tertiary-darkgreen);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .mb-main-link:hover { color: var(--primary-default); }
  .mb-main-link.is-active {
    color: var(--primary-default);
    border-bottom-color: var(--primary-default);
  }

  .mb-header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mb-icon-btn {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--primary-subtle1);
    border: 2px solid var(--primary-subtle1);
    border-radius: var(--radius-s);
    cursor: pointer;
  }
  .mb-icon-btn img { width: 22px; height: 22px; display: block; }

  .mb-btn-secondary {
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
    height: 48px;
    padding: 0 var(--spacing-m);
    background: var(--primary-subtle1);
    border: none;
    border-radius: var(--radius-xs);
    color: var(--primary-default);
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .mb-btn-secondary svg { width: 24px; height: 24px; flex-shrink: 0; }

  .mb-btn-login {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 200px;
    height: 48px;
    border-radius: var(--radius-xs);
    background: linear-gradient(18deg, var(--accent1-pink) 3%, var(--accent1) 90%);
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    text-decoration: none;
    white-space: nowrap;
    transition: opacity 0.15s ease;
  }
  .mb-btn-login:hover { opacity: 0.92; }

  /* Hamburger — mobile only */
  .page-header-menu {
    width: 24px;
    height: 24px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }
  .page-header-menu span {
    display: block;
    width: 18px;
    height: 2px;
    background: var(--neutral-bold3);
    border-radius: 1px;
  }

  /* ───────────────── Responsive: collapse to logo + hamburger ───────────────── */
  @media (max-width: 900px) {
    .mb-header {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      box-shadow: none;
      border-bottom: 1px solid var(--primary-subtle3);
    }
    .mb-header-inner { padding: 0 var(--spacing-s); }
    .mb-header-top {
      height: 56px;
      align-items: center;
    }
    .mb-logo img { height: 22px; }
    .mb-meta-nav,
    .mb-header-bottom { display: none; }
    .page-header-menu { display: flex; }
  }

  /* ───────────────── Placeholder body ───────────────── */
  .pn-main {
    flex: 0 1 auto;
    padding: 12px var(--spacing-s) 0;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
  }
  .pn-main .section-heading { padding: 24px 0 4px; }
  .pn-main .section-heading h1 {
    font-size: 26px;
    font-weight: 500;
    color: var(--primary-default);
    line-height: 1.31;
    letter-spacing: -0.26px;
  }
  .pn-main .section-heading p {
    font-size: 16px;
    font-weight: 400;
    color: var(--primary-default);
    line-height: 1.375;
    letter-spacing: 0.08px;
    margin-top: 8px;
    max-width: 36em;
  }
</style>
</head>
<body>

  <header class="mb-header">
    <div class="mb-header-inner">
      <!-- Top row: logo + meta links -->
      <div class="mb-header-top">
        <a class="mb-logo" href="index.html" aria-label="Migros Bank Startseite">
          <img src="assets/migrosbank-logo.svg" alt="Migros Bank">
        </a>
        <nav class="mb-meta-nav" aria-label="Sekundärnavigation">
          <a class="mb-meta-link is-active" href="#">Privatpersonen</a>
          <a class="mb-meta-link" href="#">Firmen</a>
          <a class="mb-meta-link" href="#">Ratgeber</a>
          <a class="mb-meta-link" href="#">Über uns</a>
          <a class="mb-meta-link" href="#">Hilfe</a>
          <a class="mb-meta-link" href="#">Kontakt</a>
        </nav>
        <button class="page-header-menu" type="button" aria-label="Menü">
          <span></span><span></span><span></span>
        </button>
      </div>

      <!-- Bottom row: main nav + actions -->
      <div class="mb-header-bottom">
        <nav class="mb-main-nav" aria-label="Hauptnavigation">
          <a class="mb-main-link is-active" href="#">Konten &amp; Karten</a>
          <a class="mb-main-link" href="#">Hypotheken</a>
          <a class="mb-main-link" href="#">Kredite</a>
          <a class="mb-main-link" href="#">Anlegen</a>
          <a class="mb-main-link" href="#">Vorsorgen</a>
          <a class="mb-main-link" href="#">E-Banking</a>
        </nav>
        <div class="mb-header-actions">
          <button class="mb-icon-btn" type="button" aria-label="Suche">
            <img src="assets/icon-search.svg" alt="">
          </button>
          <button class="mb-btn-secondary" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            Alle Produkte
          </button>
          <a class="mb-btn-login" href="#">E-Banking Login</a>
        </div>
      </div>
    </div>
  </header>

  <main class="pn-main">
    <div class="section-heading">
      <h1>Willkommen bei der Migros Bank</h1>
      <p>Diese Seite zeigt die neue responsive Kopfnavigation. Verkleinern Sie das Fenster, um die mobile Ansicht (Logo + Menü) zu sehen.</p>
    </div>
  </main>

</body>
</html>
