<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migros Bank</title>
<link rel="preload" href="assets/fonts/MigrosbankKievit-Book.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/MigrosbankKievit-Bold.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Book.woff2') format('woff2');
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Bold.woff2') format('woff2');
    font-weight: 500;
    font-display: swap;
  }
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Bold.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
  }

  /* ── Migros Bank Design Tokens (from Figma) ── */
  :root {
    --primary-default:    #144b3c;
    --primary-ondefault:  #ffffff;
    --primary-subtle1:    #eff2f1;
    --primary-subtle2:    #dce4e2;
    --primary-subtle3:    #c4d2ce;
    --tertiary-darkgreen: #6b7a6c;
    --accent1:            #4f1c68;
    --accent1-pink:       #d9007e;
    --warning-default:    #ee750c;
    --warning-border:     #ff8c28;
    --warning-subtle2:    #fce9d8;
    --neutral-bold3:      #333333;

    --spacing-xs:  8px;
    --spacing-s:   16px;
    --spacing-m:   24px;
    --spacing-l:   32px;

    --radius-xs:  6px;
    --radius-s:   8px;

    --font-family: 'Migrosbank Kievit', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  html, body { height: 100%; }

  body {
    font-family: var(--font-family);
    background: var(--primary-ondefault);
    color: var(--primary-default);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ───────────────── Page header (desktop mega-nav) ───────────────── */
  .mb-header {
    background: var(--primary-ondefault);
    box-shadow: 0 4px 50px rgba(79, 31, 104, 0.1);
    flex-shrink: 0;
    z-index: 9;
  }
  .mb-header-inner {
    max-width: 1920px;
    margin: 0 auto;
    padding: 0 40px;
  }

  /* Top row — logo + meta links */
  .mb-header-top {
    height: 45px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: var(--spacing-m);
  }
  .mb-logo { display: flex; align-items: center; text-decoration: none; }
  .mb-logo img { width: 201px; height: 30px; display: block; object-fit: contain; }

  .mb-meta-nav {
    display: flex;
    align-items: flex-end;
    gap: var(--spacing-m);
  }
  .mb-meta-link {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--tertiary-darkgreen);
    text-decoration: none;
    padding-bottom: 2px;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .mb-meta-link:hover { color: var(--primary-default); }
  .mb-meta-link.is-active {
    color: var(--primary-default);
    border-bottom-color: var(--primary-default);
  }

  /* Bottom row — main nav + actions */
  .mb-header-bottom {
    height: 75px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--spacing-m);
  }
  .mb-main-nav {
    display: flex;
    align-items: stretch;
    gap: var(--spacing-l);
    height: 75px;
  }
  .mb-main-link {
    display: flex;
    align-items: flex-start;
    height: 75px;
    padding-top: 24px;
    font-size: 18px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--tertiary-darkgreen);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .mb-main-link:hover { color: var(--primary-default); }
  .mb-main-link.is-active {
    color: var(--primary-default);
    border-bottom-color: var(--primary-default);
  }

  .mb-header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mb-icon-btn {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--primary-subtle1);
    border: 2px solid var(--primary-subtle1);
    border-radius: var(--radius-s);
    cursor: pointer;
  }
  .mb-icon-btn img { width: 22px; height: 22px; display: block; }

  .mb-btn-secondary {
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
    height: 48px;
    padding: 0 var(--spacing-m);
    background: var(--primary-subtle1);
    border: none;
    border-radius: var(--radius-xs);
    color: var(--primary-default);
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .mb-btn-secondary img { width: 24px; height: 24px; flex-shrink: 0; display: block; }

  .mb-btn-login {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 200px;
    height: 48px;
    border-radius: var(--radius-xs);
    background: linear-gradient(18deg, var(--accent1-pink) 3%, var(--accent1) 90%);
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    text-decoration: none;
    white-space: nowrap;
    transition: opacity 0.15s ease;
  }
  .mb-btn-login:hover { opacity: 0.92; }

  /* Hamburger — mobile only */
  .page-header-menu {
    width: 24px;
    height: 24px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }
  .page-header-menu span {
    display: block;
    width: 18px;
    height: 2px;
    background: var(--neutral-bold3);
    border-radius: 1px;
  }

  /* ───────────────── Responsive: collapse to logo + hamburger ───────────────── */
  @media (max-width: 1200px) {
    .mb-header {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      box-shadow: none;
      border-bottom: 1px solid var(--primary-subtle3);
    }
    .mb-header-inner { padding: 0 var(--spacing-s); }
    .mb-header-top {
      height: 56px;
      align-items: center;
    }
    .mb-logo img { width: 147px; height: 22px; }
    .mb-meta-nav,
    .mb-header-bottom { display: none; }
    .page-header-menu { display: flex; }
  }

  /* ───────────────── Placeholder body ───────────────── */
  .pn-main {
    flex: 0 1 auto;
    padding: 12px var(--spacing-s) 0;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
  }
  .pn-main .section-heading { padding: 24px 0 4px; }
  .pn-main .section-heading h1 {
    font-size: 26px;
    font-weight: 500;
    color: var(--primary-default);
    line-height: 1.31;
    letter-spacing: -0.26px;
  }
  .pn-main .section-heading p {
    font-size: 16px;
    font-weight: 400;
    color: var(--primary-default);
    line-height: 1.375;
    letter-spacing: 0.08px;
    margin-top: 8px;
    max-width: 36em;
  }

  /* ───────────────── Produkt- & Service-Welt overview ───────────────── */
  .ov { background: #ffffff; width: 100%; flex-shrink: 0; }
  .ov-inner { max-width: 1440px; margin: 0 auto; padding: 48px clamp(16px, 5vw, 155px) 56px; }
  .ov-head { display: flex; flex-direction: column; align-items: center; gap: 24px; text-align: center; }
  .ov-title { font-size: clamp(24px, 3vw, 34px); font-weight: 500; line-height: 1.3; color: var(--primary-default); }
  .ov-tabs { display: inline-flex; flex-wrap: wrap; justify-content: center; gap: 4px; padding: 6px; background: var(--primary-subtle1); border-radius: var(--radius-s); }
  .ov-tab { appearance: none; border: none; background: none; cursor: pointer; font-family: inherit; font-size: clamp(15px, 1.6vw, 18px); font-weight: 500; color: var(--primary-default); padding: 12px 24px; border-radius: var(--radius-xs); white-space: nowrap; transition: background .15s ease, color .15s ease; }
  .ov-tab:hover { background: var(--primary-subtle2); color: var(--primary-default); }
  .ov-tab.is-active { background: var(--primary-default); color: #fff; }

  .ov-panel { margin-top: 40px; }
  .ov-panel[hidden] { display: none; }

  .ov-grid { display: grid; grid-template-columns: repeat(3, 1fr); column-gap: clamp(32px, 6vw, 85px); row-gap: 56px; }
  .ov-card { display: flex; flex-direction: column; }
  .ov-card-media { position: relative; display: block; border-radius: var(--radius-xs); overflow: hidden; aspect-ratio: 320 / 240; }
  .ov-card-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ov-card-media::after { content: ""; position: absolute; inset: 0; border-radius: inherit; background: linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,0.3) 75%, rgba(0,0,0,0.5) 100%); }
  .ov-card-title { position: absolute; left: 16px; bottom: 12px; z-index: 1; color: #fff; font-size: clamp(20px, 2.2vw, 28px); font-weight: 500; line-height: 1.25; padding-right: 16px; }
  .ov-card-media--illu { aspect-ratio: auto; background: var(--primary-subtle1); }
  .ov-card-media--illu::after { content: none; }
  .ov-card-media--illu img { height: auto; object-fit: contain; }

  .ov-links { list-style: none; margin: 8px 0 0; padding: 0; }
  .ov-links a { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 8px 0; color: var(--primary-default); font-size: clamp(16px, 1.4vw, 18px); font-weight: 500; line-height: 1.4; text-decoration: none; }
  .ov-links a span { text-decoration: underline; text-underline-offset: 3px; }
  .ov-links a:hover { color: var(--primary-subtle5); }
  .ov-arrow { flex-shrink: 0; width: 24px; height: 24px; margin-top: 1px; }

  .ov-tools { margin-top: 72px; }
  .ov-tools-head { text-align: center; margin-bottom: 40px; }
  .ov-tools-head h3 { font-size: clamp(22px, 2.6vw, 28px); font-weight: 500; color: var(--primary-default); }
  .ov-tools-head p { margin-top: 8px; font-size: clamp(15px, 1.6vw, 18px); color: var(--primary-default); }
  .ov-tools-grid { display: grid; grid-template-columns: repeat(2, 1fr); column-gap: clamp(24px, 4vw, 64px); row-gap: 16px; align-items: start; }
  .ov-tools-col { display: flex; flex-direction: column; gap: 32px; }
  .ov-tool-cat > h4 { font-size: clamp(18px, 2vw, 24px); font-weight: 500; color: var(--primary-default); margin-bottom: 8px; }
  .ov-tool { display: flex; align-items: flex-start; gap: 16px; padding: 16px; margin-top: 8px; border-radius: var(--radius-s); background: #fff; text-decoration: none; color: inherit; transition: box-shadow .15s ease; }
  .ov-tool:hover { box-shadow: 0 2px 14px rgba(20,75,60,0.10); }
  .ov-tool-icon { flex-shrink: 0; width: 32px; height: 32px; color: var(--primary-default); margin-top: 2px; }
  .ov-tool-body { flex: 1; min-width: 0; }
  .ov-tool-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: clamp(16px, 1.6vw, 18px); font-weight: 500; color: var(--primary-default); }
  .ov-tool-desc { margin-top: 4px; font-size: 14px; line-height: 1.4; color: var(--tertiary-darkgreen); }
  .ov-tool .ov-arrow { width: 20px; height: 20px; }

  /* Recommendation "Live Teaser" */
  .ov-teaser { display: flex; align-items: center; justify-content: space-between; gap: 24px; margin-top: 40px; padding: 24px; background: transparent; border: 1.5px solid var(--primary-subtle2); border-radius: 16px; }
  .ov-teaser-text { display: flex; flex-direction: column; gap: 2px; }
  .ov-teaser-title { font-size: clamp(18px, 1.8vw, 20px); font-weight: 500; line-height: 1.4; color: var(--primary-default); }
  .ov-teaser-sub { font-size: clamp(16px, 1.6vw, 18px); font-weight: 400; line-height: 1.5; color: var(--primary-default); }
  .ov-teaser-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; flex-shrink: 0; height: 56px; padding: 8px 48px; border: 2px solid transparent; border-radius: 8px; background: linear-gradient(var(--primary-ondefault), var(--primary-ondefault)) padding-box, linear-gradient(to top right, var(--warning-border), var(--accent1-pink), var(--warning-border)) border-box; background-size: auto, 200% 200%; background-position: 0 0, var(--ov-flow, 0%) 50%; box-shadow: 0 4px 8px 0 var(--warning-subtle2); color: var(--warning-default); font-size: 18px; font-weight: 500; text-decoration: none; white-space: nowrap; will-change: transform; }
  .ov-teaser-btn svg { width: 24px; height: 24px; display: block; flex-shrink: 0; }
  @media (prefers-reduced-motion: reduce) { .ov-teaser-btn { transition: box-shadow .2s ease; } .ov-teaser-btn:hover { box-shadow: 0 8px 20px 0 var(--warning-subtle2); } }

  @media (max-width: 1100px) { .ov-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 700px) {
    .ov-grid { grid-template-columns: 1fr; }
    .ov-tools-grid { grid-template-columns: 1fr; }
    .ov-teaser { flex-direction: column; align-items: flex-start; padding: 20px; }
    .ov-teaser-btn { align-self: stretch; justify-content: center; }
  }
</style>
</head>
<body>

  <header class="mb-header">
    <div class="mb-header-inner">
      <!-- Top row: logo + meta links -->
      <div class="mb-header-top">
        <a class="mb-logo" href="index.html" aria-label="Migros Bank Startseite">
          <img src="assets/migrosbank-logo.svg" alt="Migros Bank">
        </a>
        <nav class="mb-meta-nav" aria-label="Sekundärnavigation">
          <a class="mb-meta-link is-active" href="#">Privatpersonen</a>
          <a class="mb-meta-link" href="#">Firmen</a>
          <a class="mb-meta-link" href="#">Ratgeber</a>
          <a class="mb-meta-link" href="#">Über uns</a>
          <a class="mb-meta-link" href="#">Hilfe</a>
          <a class="mb-meta-link" href="#">Kontakt</a>
        </nav>
        <button class="page-header-menu" type="button" aria-label="Menü">
          <span></span><span></span><span></span>
        </button>
      </div>

      <!-- Bottom row: main nav + actions -->
      <div class="mb-header-bottom">
        <nav class="mb-main-nav" aria-label="Hauptnavigation">
          <a class="mb-main-link" href="#">Konten &amp; Karten</a>
          <a class="mb-main-link" href="#">Hypotheken</a>
          <a class="mb-main-link" href="#">Kredite</a>
          <a class="mb-main-link" href="#">Anlegen</a>
          <a class="mb-main-link" href="#">Vorsorgen</a>
          <a class="mb-main-link" href="#">E-Banking</a>
        </nav>
        <div class="mb-header-actions">
          <button class="mb-icon-btn" type="button" aria-label="Suche">
            <img src="assets/icon-search.svg" alt="">
          </button>
          <a class="mb-btn-secondary" href="pn_navigator.html">
            <img src="assets/Maps-Search Streamline Ultimate.svg" alt="">
            Alle Produkte
          </a>
          <a class="mb-btn-login" href="#">E-Banking Login</a>
        </div>
      </div>
    </div>
  </header>

  <section class="ov">
    <div class="ov-inner" style="display:flex; justify-content:center; align-items:flex-start;">
      <img src="assets/Home.png" alt="Home" style="max-width:100%; height:auto; display:block;">
    </div>
  </section>


  <script>
    document.querySelectorAll('.ov-tab').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var tab = btn.dataset.tab;
        document.querySelectorAll('.ov-tab').forEach(function (b) {
          b.classList.toggle('is-active', b === btn);
        });
        document.querySelectorAll('.ov-panel').forEach(function (p) {
          p.hidden = (p.dataset.tab !== tab);
        });
      });
    });
  </script>

  <!-- GSAP (https://gsap.com) — animated hover for the teaser button -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script>
    (function () {
      if (typeof gsap === 'undefined') return;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      document.querySelectorAll('.ov-teaser-btn').forEach(function (btn) {
        var icon = btn.querySelector('svg');

        // Continuous gradient-border flow — paused until hover (seamless 0%↔200% loop)
        var flow = gsap.to(btn, {
          '--ov-flow': '200%',
          duration: 3,
          ease: 'none',
          repeat: -1,
          paused: true
        });

        // Reversible lift + scale + deeper shadow
        var hover = gsap.timeline({ paused: true }).to(btn, {
          y: -3,
          scale: 1.03,
          boxShadow: '0 12px 26px 0 rgba(238, 117, 12, 0.30)',
          duration: 0.4,
          ease: 'power3.out'
        });

        function enter() {
          hover.play();
          flow.play();
          gsap.to(icon, { rotation: '+=360', scale: 1.15, duration: 0.6, ease: 'back.out(2)' });
        }
        function leave() {
          hover.reverse();
          flow.pause();
          gsap.to(icon, { scale: 1, duration: 0.3, ease: 'power2.out' });
        }

        btn.addEventListener('mouseenter', enter);
        btn.addEventListener('mouseleave', leave);
        btn.addEventListener('focus', enter);
        btn.addEventListener('blur', leave);
      });
    })();
  </script>

</body>
</html>
