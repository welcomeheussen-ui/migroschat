<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB Client Needs</title>
<style>
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Book.woff2') format('woff2');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Bold.woff2') format('woff2');
    font-weight: 500;
  }
  @font-face {
    font-family: 'Migrosbank Kievit';
    src: url('assets/fonts/MigrosbankKievit-Bold.woff2') format('woff2');
    font-weight: 700;
  }

  /* ── Migros Bank Design Tokens (from Figma) ── */
  :root {
    --primary-default:    #144b3c;
    --primary-ondefault:  #ffffff;
    --primary-subtle1:    #eff2f1;
    --primary-subtle3:    #c4d2ce;
    --primary-subtle4:    #92a59e;
    --primary-subtle5:    #5a8a7e;
    --neutral-bold3:      #333333;
    --neutral-bold5:      #000000;
    /* Spacing */
    --spacing-xs:  8px;
    --spacing-s:   16px;
    --spacing-m:   24px;

    /* Radius */
    --radius-s:  8px;
    --radius-m:  12px;
    --radius-l:  16px;

    /* Typography – Migrosbank Kievit → fallback to system */
    --font-family: 'Migrosbank Kievit', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

  body {
    font-family: var(--font-family);
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  /* ── Responsive app shell ── */
  .shell {
    width: min(100%, 600px);
    min-height: 100vh;
    background: var(--primary-ondefault);
    border-radius: 0;
    box-shadow: none;
    overflow: visible;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Page header ── */
  .page-header {
    height: 50px;
    background: var(--primary-ondefault);
    border-bottom: 1px solid var(--primary-subtle3);
    width: 100vw;
    margin-left: calc(50% - 50vw);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--spacing-s);
    flex-shrink: 0;
    z-index: 9;
    box-shadow: none;
  }
  .mb-logo {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mb-logo-mark {
    width: auto;
    height: 22px;
    display: block;
    object-fit: contain;
    cursor: pointer;
  }
  .mb-back-btn {
    display: none;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--primary-default);
    font-family: var(--font-family);
    font-size: 16px;
    font-weight: 400;
    padding: 4px 0;
  }
  .mb-back-btn.visible { display: flex; }
  .page-header-menu {
    width: 24px; height: 24px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
    cursor: pointer;
  }
  .page-header-menu span {
    display: block; width: 18px; height: 2px;
    background: var(--neutral-bold3); border-radius: 1px;
  }

  /* ── Body (view host) ── */
  .body {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: var(--primary-ondefault);
  }

  /* ── Views ── */
  .view {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    overflow-y: auto;
    transform: translateX(100%);
    opacity: 0;
    transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .25s;
    pointer-events: none;
    will-change: transform;
  }
  .view::-webkit-scrollbar { width: 0; }
  .view.active { transform: translateX(0); opacity: 1; pointer-events: auto; }
  .view.exit-left { transform: translateX(-40px); opacity: 0; pointer-events: none; }

  /* #v2: keep footer area stable, scroll question list only */
  #v2.view { overflow: hidden; }

  /* #v3 special: no scroll itself, inner msgs scrolls */
  #v3.view { overflow: hidden; }
  #v3 .msgs { flex:1; min-height:0; overflow-y:auto; }
  #v3 .msgs::-webkit-scrollbar { width: 0; }

  /* ── Section title ── */
  .section-heading {
    padding: 20px var(--spacing-s) 4px;
  }
  .section-heading h1 {
    font-size: 26px;
    font-weight: 500;
    color: var(--primary-default);
    line-height: 1.31;
    letter-spacing: -0.26px;
  }
  .section-heading p {
    font-size: 16px;
    font-weight: 400;
    color: var(--primary-default);
    line-height: 1.375;
    letter-spacing: 0.08px;
    margin-top: 8px;
  }

  /* ── Breadcrumb tag ── */
  .breadcrumb-tag {
    display: inline-flex;
    width: max-content;
    align-items: center;
    margin: 16px var(--spacing-s) 0;
    padding: 3px 10px;
    background: rgba(45,143,111,0.09);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    line-height: 1.417;
    color: #2d8f6f;
    letter-spacing: 0.5px;
  }

  /* ── Action Button (Migros Bank pattern) ── */
  .action-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px var(--spacing-s) 24px;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    background: var(--primary-ondefault);
    border: 1.5px solid var(--primary-subtle3);
    border-radius: var(--radius-m);
    cursor: pointer;
    text-align: left;
    transition: all .18s cubic-bezier(.4,0,.2,1);
    width: 100%;
  }
  .action-btn:hover, .action-btn:active {
    border-color: var(--primary-default);
    background: var(--primary-subtle1);
  }
  .action-btn-icon {
    width: 40px; height: 40px; flex-shrink: 0;
    background: var(--primary-subtle1);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .action-btn-icon svg { width: 22px; height: 22px; color: var(--primary-default); }
  .action-btn-text { flex: 1; min-width: 0; }
  .action-btn-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--primary-default);
    line-height: 1.4;
    letter-spacing: 0.08px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .action-btn-sub {
    font-size: 14px;
    font-weight: 400;
    color: var(--primary-subtle4);
    line-height: 1.4;
    letter-spacing: 0.07px;
    margin-top: 2px;
  }
  .action-btn-chevron { flex-shrink: 0; color: var(--primary-subtle4); }
  .action-btn:hover .action-btn-chevron { color: var(--primary-default); }

  /* Staggered fade-in for list items when a view becomes active */
  @keyframes itemFadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: none; }
  }
  .view.active .action-btn,
  .view.active .question-item {
    animation: itemFadeIn .95s cubic-bezier(.16,1,.3,1) both;
  }
  .view.active .action-btn:nth-child(1) { animation-delay: .10s; }
  .view.active .action-btn:nth-child(2) { animation-delay: .22s; }
  .view.active .action-btn:nth-child(3) { animation-delay: .34s; }
  .view.active .action-btn:nth-child(4) { animation-delay: .47s; }
  .view.active .action-btn:nth-child(5) { animation-delay: .60s; }
  .view.active .action-btn:nth-child(6) { animation-delay: .72s; }
  .view.active .action-btn:nth-child(7) { animation-delay: .83s; }
  .view.active .action-btn:nth-child(8) { animation-delay: .93s; }
  @media (prefers-reduced-motion: reduce) {
    .view.active .action-btn,
    .view.active .question-item { animation: none; }
  }

  /* Question list (v2) */
  .question-list {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    gap: 8px;
    padding: 8px var(--spacing-s) 16px;
    background: transparent;
    margin: 8px 0;
    border-radius: var(--radius-l);
  }
  .question-list::-webkit-scrollbar { width: 0; }
  .question-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px var(--spacing-s);
    background: var(--primary-ondefault);
    border: 1.5px solid var(--primary-subtle3);
    border-radius: var(--radius-m);
    cursor: pointer;
    text-align: left;
    font-family: var(--font-family);
    font-size: 15px;
    font-weight: 400;
    color: var(--primary-default);
    line-height: 1.45;
    letter-spacing: 0.07px;
    transition: all .18s cubic-bezier(.4,0,.2,1);
    width: 100%;
  }
  .question-item:hover { background: var(--primary-subtle1); border-color: var(--primary-default); }
  .q-num {
    width: 26px; height: 26px; flex-shrink: 0;
    background: rgba(20,75,60,0.08);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; color: var(--primary-default);
  }
  .q-label { font-size: 16px; }

  /* V2 free input */
  .v2-free-input {
    margin: 0 var(--spacing-s) 24px;
    padding: 14px var(--spacing-s);
    border-top: 1px solid var(--primary-subtle3);
  }
  .v2-free-label {
    font-size: 12px;
    color: var(--primary-subtle4);
    margin-bottom: 8px;
    letter-spacing: 0.1px;
  }
  .v2-inp-row { display: flex; gap: 8px; align-items: flex-end; }
  .v2-inp-row textarea {
    flex: 1;
    background: var(--primary-subtle1);
    border: 1.5px solid var(--primary-subtle3);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: var(--font-family);
    font-size: 15px; color: var(--primary-default);
    resize: none; min-height: 44px; max-height: 100px;
    outline: none; line-height: 1.4; overflow-y: auto;
    transition: border-color .15s;
  }
  .v2-inp-row textarea::placeholder { color: var(--primary-subtle4); }
  .v2-inp-row textarea:focus { border-color: var(--primary-default); background: white; }

  /* ── Chat view ── */
  .ctx-bar {
    background: var(--primary-default);
    padding: 10px var(--spacing-s);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .ctx-icon { font-size: 16px; }
  .ctx-ev { font-size: 10px; color: rgba(255,255,255,.55); text-transform: uppercase; letter-spacing: 0.8px; }
  .ctx-q  { font-size: 13px; color: rgba(255,255,255,.85); margin-top: 2px; line-height: 1.35; }

  .msgs {
    padding: 16px var(--spacing-s) 12px;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* ── Messages ── */
  .msg { display: flex; gap: 8px; animation: msgIn .28s cubic-bezier(.34,1.1,.64,1) both; }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .msg.user { justify-content: flex-end; }

  .msg-av {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
    background: var(--primary-default);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; color: white;
    letter-spacing: -0.5px;
  }

  .bubble {
    max-width: 82%; padding: 10px 14px;
    border-radius: 18px; font-size: 14.5px; line-height: 1.5;
    color: var(--primary-default);
    font-family: var(--font-family);
  }
  .msg.bot .bubble {
    background: var(--primary-subtle1);
    border-bottom-left-radius: 5px;
  }
  .msg.user .bubble {
    background: var(--primary-default);
    color: white;
    border-bottom-right-radius: 5px;
  }
  .bubble p { margin-bottom: 5px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul { padding-left: 14px; margin: 5px 0; display:flex; flex-direction:column; gap:3px; }
  .bubble li { font-size: 14px; }
  .bubble strong { font-weight: 500; }
  .msg-time { font-size: 10px; color: var(--primary-subtle4); margin-top: 3px; padding: 0 3px; }
  .msg.user .msg-time { text-align: right; }

  /* ── Suggestion chips ── */
  .ichips {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 0 0 2px 36px;
    animation: msgIn .3s .06s cubic-bezier(.34,1.1,.64,1) both;
  }
  .ic {
    padding: 4px 12px;
    border: 1px solid #c4e1ce;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    line-height: 1.5;
    color: #005a1f;
    background: #eff7f1;
    cursor: pointer;
    font-family: var(--font-family);
    white-space: nowrap;
    transition: all .15s;
  }
  .ic:hover { background: #c4e1ce; border-color: #005a1f; }

  /* ── Typing indicator ── */
  .typing { display: flex; gap: 8px; align-items: flex-end; }
  .typing-bub {
    background: var(--primary-subtle1);
    border-radius: 18px; border-bottom-left-radius: 5px;
    padding: 13px 16px; display: flex; gap: 4px; align-items: center;
  }
  .td { width: 5px; height: 5px; background: var(--primary-default); border-radius: 50%; opacity: .5; animation: td 1.2s ease-in-out infinite; }
  .td:nth-child(2){animation-delay:.15s} .td:nth-child(3){animation-delay:.3s}
  @keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

  /* ── Article cards ── */
  .article-strip {
    display: flex; flex-direction: column; gap: 6px;
    padding: 2px 0 0;
  }
  .article-strip-label {
    font-size: 10px; color: var(--primary-subtle4);
    letter-spacing: 1px; text-transform: uppercase; font-weight: 500;
    margin-bottom: 2px;
  }
  .article-card {
    display: flex; align-items: stretch; gap: 0;
    background: var(--primary-ondefault);
    border: 1px solid var(--primary-subtle3);
    border-radius: 16px;
    text-decoration: none; cursor: pointer;
    overflow: hidden;
    min-height: 100px;
    transition: all .18s cubic-bezier(.4,0,.2,1);
  }
  .article-card:hover { border-color: var(--primary-default); background: var(--primary-subtle1); }
  .article-card-img {
    width: 104px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--primary-subtle1), var(--primary-subtle3)) center/cover no-repeat;
  }
  .article-card-body {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    gap: 4px; align-items: flex-start;
    justify-content: center;
    padding: 8px 16px;
  }
  .article-tag {
    font-size: 12px; font-weight: 500;
    line-height: 1.5; letter-spacing: 0;
    color: #4f1c68;
    display: inline-flex; align-items: center;
    padding: 4px 12px;
    background: #f3eff4;
    border: 1px solid #d3c6d9;
    border-radius: 99px;
    white-space: nowrap;
  }
  .article-title {
    font-size: 16px; font-weight: 500;
    color: var(--primary-default);
    line-height: 1.5; letter-spacing: 0;
    display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* ── Product cards (V3) ── */
  .product-strip {
    display: flex; flex-direction: column;
    gap: 8px; padding: 2px 0 0;
    margin-top: 12px;
  }
  .product-strip-label {
    font-size: 10px; color: var(--primary-subtle4);
    letter-spacing: 1px; text-transform: uppercase; font-weight: 500;
    margin-bottom: 2px;
  }
  .product-card {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    background: var(--primary-ondefault);
    border: 1px solid var(--primary-subtle3);
    border-radius: var(--radius-m);
    text-decoration: none; cursor: pointer;
    transition: all .18s cubic-bezier(.4,0,.2,1);
  }
  .product-card:hover {
    border-color: var(--primary-default);
    background: var(--primary-subtle1);
  }
  .product-card-icon {
    width: 40px; height: 40px; flex-shrink: 0;
    background: var(--primary-subtle1);
    border-radius: var(--radius-m);
    display: flex; align-items: center; justify-content: center;
    color: var(--primary-default);
  }
  .product-card-icon svg { width: 22px; height: 22px; }
  .product-card-body { flex: 1; min-width: 0; }
  .product-card-title {
    font-size: 16px; font-weight: 500;
    color: var(--primary-default);
    line-height: 1.4; letter-spacing: 0.08px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .product-card-sub {
    font-size: 12px; font-weight: 400;
    color: var(--primary-subtle4);
    line-height: 1.417; letter-spacing: 0.06px;
    margin-top: 2px;
  }
  .product-card-chevron {
    flex-shrink: 0; color: var(--primary-subtle4);
    display: flex; align-items: center;
  }
  .product-card:hover .product-card-chevron { color: var(--primary-default); }

  /* ── Advisory card ── */
  .advisory-card {
    margin: 8px 0 6px;
    background: var(--primary-subtle1);
    border-radius: var(--radius-l);
    padding: 16px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .advisory-header { display: flex; align-items: center; gap: 12px; }
  .advisory-av {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    background: var(--primary-subtle3) center/cover no-repeat;
    overflow: hidden;
  }
  .advisory-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .advisory-title {
    font-size: 14px; font-weight: 500;
    color: var(--primary-default);
    line-height: 1.429; letter-spacing: 0.07px;
  }
  .advisory-role {
    font-size: 11px; font-weight: 400;
    color: var(--primary-default);
    line-height: 1.375; letter-spacing: 0.04px;
    margin-top: 2px;
  }
  .advisory-desc {
    font-size: 14px; font-weight: 400;
    color: var(--primary-default);
    line-height: 1.429; letter-spacing: 0.07px;
    padding-left: 52px;
  }
  .advisory-btn {
    margin-left: 52px;
    height: 32px; padding: 4px 16px;
    background: var(--primary-default);
    border: none;
    border-radius: 6px;
    font-family: var(--font-family);
    font-size: 16px; font-weight: 400;
    color: var(--primary-ondefault);
    cursor: pointer;
    transition: all .15s;
    display: flex; align-items: center; justify-content: center;
    white-space: nowrap;
    line-height: 1.375;
    text-align: center;
    text-decoration: none;
  }
  .advisory-btn:hover { background: #0e3c30; }

  /* ── New topic + Input ── */
  .new-strip { padding: 8px var(--spacing-s) 0; flex-shrink: 0; }
  .new-btn {
    width: 100%; padding: 9px;
    border: 1.5px dashed var(--primary-subtle3);
    border-radius: 12px; background: transparent; cursor: pointer;
    font-family: var(--font-family); font-size: 13px; color: var(--primary-subtle4);
    transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .new-btn:hover { border-color: var(--primary-default); color: var(--primary-default); }

  .inp-wrap { padding: 10px var(--spacing-s) 20px; flex-shrink: 0; }
  .inp-row { display: flex; gap: 8px; align-items: flex-end; }
  .inp {
    flex: 1;
    background: var(--primary-subtle1); border: 1.5px solid var(--primary-subtle3);
    border-radius: 12px; padding: 10px 14px;
    font-family: var(--font-family); font-size: 15px; color: var(--primary-default);
    resize: none; min-height: 44px; max-height: 110px;
    outline: none; line-height: 1.45; overflow-y: auto; transition: border-color .15s;
  }
  .inp::placeholder { color: var(--primary-subtle4); }
  .inp:focus { border-color: var(--primary-default); background: white; }

  .send-btn {
    width: 44px; height: 44px; flex-shrink: 0;
    background: var(--primary-default); border: none; border-radius: 12px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: white; transition: all .15s;
  }
  .send-btn:hover:not(:disabled) { opacity: .85; }
  .send-btn:disabled { opacity: .35; cursor: not-allowed; }

  .inp-footer { margin-top: 6px; text-align: center; font-size: 10.5px; color: var(--primary-subtle4); }

  /* ── Send button from v2 ── */
  .send-btn-sm {
    width: 40px; height: 40px; flex-shrink: 0;
    background: var(--primary-default); border: none; border-radius: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: white; transition: all .15s;
  }
  .send-btn-sm:disabled { opacity: .35; cursor: not-allowed; }
</style>
</head>
<body>
<div class="shell">

  <!-- Page Header -->
  <div class="page-header">
    <button class="mb-back-btn" id="backBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div id="pageHeaderLogo" class="mb-logo">
      <img class="mb-logo-mark" src="assets/migo-logo.png" alt="Migros Bank">
    </div>
    <div id="pageHeaderMenu" class="page-header-menu">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Views -->
  <div class="body">

    <!-- VIEW 1: Life Events -->
    <div class="view active" id="v1">
      <div class="section-heading">

  banknote: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="6" width="19" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/><path d="M6 10v.01M18 14v.01"/></svg>',
  car:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 11l1.5-4.5A2 2 0 0 1 8.4 5h7.2a2 2 0 0 1 1.9 1.5L19 11"/><rect x="3" y="11" width="18" height="6" rx="1.5"/><circle cx="7.5" cy="17" r="1.5"/><circle cx="16.5" cy="17" r="1.5"/></svg>'
};

var PRODUCTS = {
  privatkonto:    { title:'Privatkonto',    sub:'Zahlungskonto',                       url:'https://www.migrosbank.ch/de/privatpersonen/konten-karten/konten.html?konto-uebersicht=zahlen', icon:'bill' },
  sparkonto:      { title:'Bonussparkonto', sub:'Sparkonto',                           url:'https://www.migrosbank.ch/de/privatpersonen/konten-karten/konten.html?konto-uebersicht=sparen', icon:'coins' },
  jugendkonto:    { title:'Jugendkonto',    sub:'Konto für Kinder & junge Erwachsene', url:'https://www.migrosbank.ch/de/privatpersonen/konten-karten/konten.html?konto-uebersicht=kinder-%26-jugendliche', icon:'user' },
  visa:           { title:'Visa Debitkarte',sub:'Karten',                              url:'https://www.migrosbank.ch/de/privatpersonen/konten-karten/karten.html', icon:'card' },
  mastercardgold: { title:'Mastercard Gold',sub:'Karten',                              url:'https://www.migrosbank.ch/de/privatpersonen/konten-karten/karten.html', icon:'card' },
  depotplus:      { title:'Depot Plus',     sub:'Anlagelösung',                        url:'https://www.migrosbank.ch/de/privatpersonen/anlegen/anlageloesungen.html', icon:'donut' },
  anlagefonds:    { title:'Anlagefonds',    sub:'Anlageinstrument',                    url:'https://www.migrosbank.ch/de/privatpersonen/anlegen/anlageinstrumente.html', icon:'chart' },
  saeule3a:       { title:'Säule 3a Konto', sub:'Vorsorgelösung',                      url:'https://www.migrosbank.ch/de/privatpersonen/vorsorgen.html', icon:'pillar' },
  hypothek:       { title:'Hypothek',       sub:'Finanzierung Eigenheim',              url:'https://www.migrosbank.ch/de/privatpersonen/hypotheken.html', icon:'home' },
  privatkredit:   { title:'Privatkredit',   sub:'Kredit & Leasing',                    url:'https://www.migrosbank.ch/de/privatpersonen/kredite.html', icon:'banknote' },
  leasing:        { title:'Auto-Leasing',   sub:'Kredit & Leasing',                    url:'https://www.migrosbank.ch/de/privatpersonen/kredite.html', icon:'car' }
};

var EVENT_PRODUCTS = {
  start:       ['privatkonto','sparkonto'],
  family:      ['privatkonto','jugendkonto'],
  house:       ['hypothek'],
  mobility:    ['leasing','privatkredit'],
  wealth:      ['depotplus','saeule3a'],
  retirement:  ['saeule3a','depotplus'],
  elderly:     ['hypothek','saeule3a'],
  inheritance: ['saeule3a','depotplus']
};

var SYSTEM = `Du der virtuelle Assistent der Mirgos Bank – kompetent, transparent und vertrauenswürdig.

SPRACHE: Ausschliesslich Deutsch, Schweizer Orthographie (kein ß, sondern ss). Anrede: «Sie». Kein Jargon, keine Floskeln.

TON: Wie ein erfahrener Bankberater – klar, direkt, empathisch. Keine Ausrufe wie «Sehr gerne!».

REGELN:
- Nur zu Themen der Mirgos Bank antworten.
- Keine individuelle Finanz- oder Anlageberatung im regulatorischen Sinne.
- Bei persönlichen Kontodaten, Kontobewegungen, Sicherheitsvorfällen: direkt an Kundendienst verweisen.
- Informationen nie erfinden. Bei Unklarheit: offen sagen und weiterleiten.
- Empfehle bei komplexen Situationen ein Beratungsgespräch.

MIRGOS BANK: Vollsortiment-Schweizer-Bank (Konten, Karten, Hypotheken, Kredite, Anlagen, Säule 3a, Pensionsplanung, Nachlassberatung). Nutze plausible typische Schweizer Bankprodukte.

ANTWORTFORMAT:
- Kurze Anfragen: 2–4 prägnante Sätze.
- Komplexere Themen: Struktur mit Zwischentiteln oder Aufzählungen.
- Jede Antwort mit konkretem nächsten Schritt abschliessen.

FOLLOW-UP: Hänge nach jeder Antwort einen Block an:
<suggestions>["kurze Folgefrage 1","kurze Folgefrage 2","kurze Folgefrage 3"]</suggestions>
Max. 7 Wörter pro Vorschlag. Handlungsorientiert, spezifisch.`;

/* ── State ── */
var curEv = null, curEvKey = null, curQ = null, chatHistory = [], loading = false;
var userName = '';
try { userName = (sessionStorage.getItem('mb.userName') || '').trim().slice(0, 40); } catch(e){}

function buildSystem(){
  if (!userName) return SYSTEM;
  return 'BENUTZER: Heisst ' + userName + '. Sprich ihn/sie sparsam (max. alle paar Antworten) mit Vornamen an, wenn es natürlich wirkt.\n\n' + SYSTEM;
}

function ctxEvLabel(label){
  return userName ? ('Hi ' + userName + ' · ' + label) : label;
}

/* ── Helpers ── */
function normalize(s) {
  return s.toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss');
}
function getTime() { return new Date().toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'}); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(text) {
  text = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  text = text.replace(/^[-•]\s+(.+)$/gm,'<li>$1</li>');
  text = text.replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');
  return text.split(/\n\n+/).map(function(p){ return p.startsWith('<ul>')?p:'<p>'+p.replace(/\n/g,'<br>')+'</p>'; }).join('');
}
function scrollToBottom() {
  var m = document.getElementById('msgs');
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ m.scrollTo({top:m.scrollHeight,behavior:'smooth'}); }); });
}
function scrollToLatestBot() {
  var m = document.getElementById('msgs');
  var bots = m.querySelectorAll('.msg.bot');
  var lastBot = bots[bots.length - 1];
  if(!lastBot) return;
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      lastBot.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // Keep a small top breathing room for readability.
      m.scrollTop = Math.max(0, m.scrollTop - 12);
    });
  });
}
function resize(el, btnId) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,110)+'px';
  document.getElementById(btnId).disabled = el.value.trim()==='';
}

/* ── Navigation ── */
function transit(from, to, back) {
  back = !!back;
  var fEl = document.getElementById(from), tEl = document.getElementById(to);
  fEl.classList.remove('active');
  if (back) fEl.style.transform='translateX(100%)'; else fEl.classList.add('exit-left');
  setTimeout(function(){ fEl.classList.remove('exit-left'); fEl.style.transform=''; },320);
  tEl.style.transform = back ? 'translateX(-40px)' : 'translateX(100%)';
  tEl.style.opacity = '0';
  tEl.classList.add('active');
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ tEl.style.transform=''; tEl.style.opacity=''; }); });
}

function pick(key) {
  curEv = EVENTS[key]; curEvKey = key;
  document.getElementById('v2breadcrumb').textContent = curEv.label;
  document.getElementById('v2title').textContent = curEv.title;
  document.getElementById('v2desc').textContent = curEv.desc;
  var ql = document.getElementById('qlist');
  ql.innerHTML = '';
  curEv.questions.forEach(function(q,i){
    var btn = document.createElement('button');
    btn.className = 'question-item';
    btn.innerHTML = '<div class="q-num">'+(i+1)+'</div><span class="q-label">'+esc(q)+'</span>';
    btn.addEventListener('click', function(){ selectQ(q); });
    // Slightly irregular stagger so the cascade feels human, not mechanical
    var jitter = (i % 2 === 0) ? 0 : 12;
    btn.style.animationDelay = (150 + i*115 + jitter) + 'ms';
    ql.appendChild(btn);
  });
  transit('v1','v2');
  document.getElementById('backBtn').classList.add('visible');
}

function selectQ(q) {
  curQ = q;
  document.getElementById('ctxIcon').textContent = curEv.icon;
  document.getElementById('ctxEv').textContent = ctxEvLabel(curEv.label);
  document.getElementById('ctxQ').textContent = q;
  document.getElementById('msgs').innerHTML = '';
  chatHistory = [];
  transit('v2','v3');
  pushUser(q); callAPI(q);
}

/** Deep link from vorsorge-wizard.html (?wizard=vorsorge&goal=&phase=) */
function openChatFromWizard(evKey, ctxLine, userMessage) {
  curEv = EVENTS[evKey];
  curEvKey = evKey;
  curQ = ctxLine;
  ['v1', 'v2', 'v3'].forEach(function (id) {
    var el = document.getElementById(id);
    el.classList.remove('active', 'exit-left');
    el.style.transform = '';
    el.style.opacity = '';
  });
  document.getElementById('v3').classList.add('active');
  document.getElementById('ctxIcon').textContent = curEv.icon;
  document.getElementById('ctxEv').textContent = ctxEvLabel(curEv.label);
  document.getElementById('ctxQ').textContent = curQ;
  document.getElementById('msgs').innerHTML = '';
  chatHistory = [];
  document.getElementById('backBtn').classList.add('visible');
  hideTyping();
  pushUser(userMessage);
  callAPI(userMessage);
}

function goBack() {
  if (document.getElementById('v3').classList.contains('active')) {
    var qlist = document.getElementById('qlist');
    if (qlist && qlist.children.length === 0) {
      transit('v3', 'v1', true);
      document.getElementById('backBtn').classList.remove('visible');
    } else {
      transit('v3', 'v2', true);
    }
  } else if (document.getElementById('v2').classList.contains('active')) {
    transit('v2','v1',true);
    document.getElementById('backBtn').classList.remove('visible');
  }
}

function restart() {
  var v1=document.getElementById('v1');
  var v2=document.getElementById('v2');
  var v3=document.getElementById('v3');
  if (v3.classList.contains('active')) {
    transit('v3','v1',true);
  } else if (v2.classList.contains('active')) {
    transit('v2','v1',true);
  } else {
    v1.classList.add('active');
    v2.classList.remove('active');
    v3.classList.remove('active');
    v1.style.transform=''; v1.style.opacity='';
    v2.style.transform=''; v2.style.opacity='';
    v3.style.transform=''; v3.style.opacity='';
  }

  hideTyping();
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('inp').value = '';
  document.getElementById('inpV2').value = '';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('sendBtnV2').disabled = true;
  document.getElementById('inp').style.height = 'auto';
  document.getElementById('inpV2').style.height = 'auto';
  document.getElementById('backBtn').classList.remove('visible');
  chatHistory=[]; curEv=null; curEvKey=null; curQ=null; loading=false;
}

/* ── Chat ── */
function pushUser(text) {
  var m=document.getElementById('msgs'), d=document.createElement('div');
  d.className='msg user';
  d.innerHTML='<div><div class="bubble">'+esc(text)+'</div><div class="msg-time">'+getTime()+'</div></div>';
  m.appendChild(d); scrollToBottom();
  chatHistory.push({role:'user',content:text});
}

function pushBot(raw) {
  var sugM=raw.match(/<suggestions>([\s\S]*?)<\/suggestions>/), sugs=[];
  var text=raw.replace(/<suggestions>[\s\S]*?<\/suggestions>/g,'').trim();
  if(sugM){try{sugs=JSON.parse(sugM[1]);}catch(e){}}

  var m=document.getElementById('msgs'), d=document.createElement('div');
  d.className='msg bot';
  d.innerHTML='<div class="msg-av">MB</div><div><div class="bubble">'+fmt(text)+'</div><div class="msg-time">'+getTime()+'</div></div>';
  m.appendChild(d);

  if(sugs.length){
    var chips=document.createElement('div'); chips.className='ichips';
    sugs.forEach(function(s){
      var b=document.createElement('button'); b.className='ic'; b.textContent=s;
      b.addEventListener('click',function(){ chips.remove(); pushUser(s); callAPI(s); });
      chips.appendChild(b);
    });
    m.appendChild(chips);
  }

  // Articles
  var ctx=[curEv?curEv.label:'', curQ||'', text].join(' ');
  var q=normalize(ctx), scored=ARTICLES.map(function(a){
    var score=0; a.keywords.forEach(function(k){ if(q.includes(normalize(k))) score++; });
    if(curEvKey){
      if(['retirement','wealth','family','inheritance','start'].includes(curEvKey) && a.tag==='Vorsorge') score+=.5;
      if(['house','elderly'].includes(curEvKey) && a.tag==='Wohnen') score+=.5;
    }
    return Object.assign({},a,{score:score});
  }).filter(function(a){return a.score>0;}).sort(function(a,b){return b.score-a.score;}).slice(0,2);

  if(scored.length){
    var strip=document.createElement('div'); strip.className='article-strip';
    var lbl=document.createElement('div'); lbl.className='article-strip-label'; lbl.textContent='Passende Ratgeber-Artikel'; strip.appendChild(lbl);
    scored.forEach(function(a){
      var card=document.createElement('a'); card.className='article-card'; card.href=a.url; card.target='_blank'; card.rel='noopener';
      var imgStyle = a.image ? ' style="background-image:url(\''+a.image+'\'); background-size:cover; background-position:center;"' : '';
      card.innerHTML='<div class="article-card-img"'+imgStyle+'></div><div class="article-card-body"><div class="article-tag">'+a.tag+'</div><div class="article-title">'+esc(a.title)+'</div></div>';
      strip.appendChild(card);
    });
    m.appendChild(strip);
  }

  // Products
  if(curEvKey && EVENT_PRODUCTS[curEvKey]){
    var pkeys=EVENT_PRODUCTS[curEvKey].slice(0,2);
    if(pkeys.length){
      var pstrip=document.createElement('div'); pstrip.className='product-strip';
      var plbl=document.createElement('div'); plbl.className='product-strip-label';
      plbl.textContent=pkeys.length===1?'Passendes Produkt':'Passende Produkte';
      pstrip.appendChild(plbl);
      pkeys.forEach(function(k){
        var p=PRODUCTS[k]; if(!p) return;
        var pcard=document.createElement('a');
        pcard.className='product-card';
        pcard.href=p.url; pcard.target='_blank'; pcard.rel='noopener';
        pcard.innerHTML='<div class="product-card-icon">'+(PRODUCT_ICONS[p.icon]||'')+'</div><div class="product-card-body"><div class="product-card-title">'+esc(p.title)+'</div><div class="product-card-sub">'+esc(p.sub)+'</div></div><div class="product-card-chevron"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>';
        pstrip.appendChild(pcard);
      });
      m.appendChild(pstrip);
    }
  }

  // Advisory
  var tl=normalize(text);
  if(ADVISORY_TRIGGERS.some(function(k){return tl.includes(normalize(k));})){
    var copy=ADVISORY_COPY[curEvKey]||ADVISORY_COPY['_default'];
    var ac=document.createElement('div'); ac.className='advisory-card';
    var ctaUrl=ADVISORY_CTA_URLS[curEvKey];
    var ctaHtml=ctaUrl
      ? '<a class="advisory-btn" href="'+ctaUrl+'" target="_blank" rel="noopener">Kostenlose Erstberatung buchen</a>'
      : '<button class="advisory-btn">Kostenlose Erstberatung buchen</button>';
    ac.innerHTML='<div class="advisory-header"><div class="advisory-av"><img src="assets/advisor.png" alt=""></div><div><div class="advisory-title">Persönliche Beratung</div><div class="advisory-role">'+copy.role+'</div></div></div><div class="advisory-desc">'+copy.desc+'</div>'+ctaHtml;
    m.appendChild(ac);
  }

  scrollToLatestBot();
  chatHistory.push({role:'assistant',content:raw});
}

function showTyping() {
  var m=document.getElementById('msgs'), d=document.createElement('div');
  d.className='typing'; d.id='typing';
  d.innerHTML='<div class="msg-av">MB</div><div class="typing-bub"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  m.appendChild(d); scrollToBottom();
}
function hideTyping(){var t=document.getElementById('typing');if(t)t.remove();}

async function callAPI(msg) {
  loading=true; document.getElementById('sendBtn').disabled=true; showTyping();
  try {
    var r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:buildSystem(),messages:chatHistory})});
    var data=await r.json(); hideTyping();
    pushBot((data.content&&data.content[0]&&data.content[0].text)?data.content[0].text:'Ein technischer Fehler ist aufgetreten. Bitte kontaktieren Sie unseren Kundendienst.');
  } catch(e){ hideTyping(); pushBot('Die Verbindung konnte nicht hergestellt werden. Bitte prüfen Sie Ihre Internetverbindung.'); }
  finally { loading=false; document.getElementById('sendBtn').disabled=document.getElementById('inp').value.trim()===''; }
}

function sendMsg(){
  var inp=document.getElementById('inp'), text=inp.value.trim();
  if(!text||loading) return;
  document.querySelectorAll('.ichips').forEach(function(c){c.remove();});
  inp.value=''; inp.style.height='auto'; document.getElementById('sendBtn').disabled=true;
  pushUser(text); callAPI(text);
}

function sendFromV2(){
  var inp=document.getElementById('inpV2'), text=inp.value.trim();
  if(!text) return;
  inp.value=''; inp.style.height='auto'; document.getElementById('sendBtnV2').disabled=true;
  selectQ(text);
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('backBtn').addEventListener('click', goBack);
  document.getElementById('pageHeaderLogo').addEventListener('click', restart);

  var inp=document.getElementById('inp'), sendBtn=document.getElementById('sendBtn');
  inp.addEventListener('input',function(){ resize(inp,'sendBtn'); });
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!sendBtn.disabled)sendMsg();}});
  sendBtn.addEventListener('click',sendMsg);

  var inpV2=document.getElementById('inpV2'), sendBtnV2=document.getElementById('sendBtnV2');
  inpV2.addEventListener('input',function(){ resize(inpV2,'sendBtnV2'); });
  inpV2.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!sendBtnV2.disabled)sendFromV2();}});
  sendBtnV2.addEventListener('click',sendFromV2);

  document.querySelectorAll('.action-btn[data-key]').forEach(function(btn){
    btn.addEventListener('click',function(){ pick(btn.dataset.key); });
  });

  if (userName) {
    var h1 = document.querySelector('#v1 .section-heading h1');
    var sub = document.querySelector('#v1 .section-heading p');
    if (h1) h1.innerHTML = 'Hi ' + esc(userName) + ',<br>was bewegt Sie im Leben?';
    if (sub) sub.textContent = 'Wählen Sie Ihre Situation und wir helfen Ihnen die passende Lösung zu finden.';
    var ph = userName + ', was beschäftigt Sie noch?';
    document.getElementById('inp').placeholder = ph;
    document.getElementById('inpV2').placeholder = ph;
  }

  var params = new URLSearchParams(window.location.search);
  if (params.get('wizard') === 'vorsorge') {
    var goal = params.get('goal') || '';
    var phase = params.get('phase') || '';
    var goalTxt = { steuern: 'Steuern und Abzüge', alter: 'Altersvorsorge', eigenheim: 'Wohneigentum', unsicher: 'Noch unsicher' };
    var phaseTxt = { aufbau: 'Berufseinstieg und Aufbauphase', familie: 'Familie und Haushalt', mitte: 'Mitte des Berufslebens', nahe: 'Nähe an Pensionierung' };
    var evKey = 'retirement';
    if (goal === 'eigenheim') evKey = 'house';
    else if (goal === 'steuern') evKey = 'wealth';
    var parts = ['Ich habe den Vorsorge-Assistenten durchlaufen.'];
    if (goal && goalTxt[goal]) parts.push('Mein Schwerpunkt: ' + goalTxt[goal] + '.');
    if (phase && phaseTxt[phase]) parts.push('Lebensphase: ' + phaseTxt[phase] + '.');
    parts.push('Bitte schlagen Sie mir eine sinnvolle erste Frage oder den nächsten Schritt vor.');
    var userMsg = parts.join(' ');
    var ctxShort = 'Vorsorge-Assistent';
    history.replaceState({}, '', window.location.pathname || 'chat.html');
    openChatFromWizard(evKey, ctxShort, userMsg);
  }
});
</script>
